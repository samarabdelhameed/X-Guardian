<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Guardian Demo Professional Presentation</title>
    <style>
        body {
            background: #0a0a0b;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 85%;
            max-width: 1200px;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 163, 255, 0.4);
            border: 1px solid rgba(0, 163, 255, 0.2);
        }
        img {
            width: 100%;
            display: block;
        }
        .dashboard-overlay {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 30px;
            border: 1px solid #00a3ff;
            font-size: 14px;
            color: #00a3ff;
            backdrop-filter: blur(5px);
        }
        .controls {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        button {
            background: linear-gradient(135deg, #00a3ff 0%, #0066ff 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            cursor: pointer;
            font-weight: 800;
            font-size: 18px;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0, 163, 255, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        button:hover {
            transform: scale(1.05) translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 163, 255, 0.5);
        }
        button:active {
            transform: scale(0.98);
        }
        #status-box {
            margin-top: 15px;
            background: rgba(255, 255, 255, 0.05);
            padding: 15px 30px;
            border-radius: 10px;
            font-family: monospace;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 5px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #444;
        }
        .status-dot.active {
            background: #00ffa3;
            box-shadow: 0 0 10px #00ffa3;
        }
        .status-dot.error {
            background: #ff4444;
        }
    </style>
</head>
<body>
    <div class="container" id="videoContainer">
        <div class="dashboard-overlay">DEFAI AGENT ACTIVE</div>
        <img id="demoVideo" src="perfect_demo_take.webp" alt="X-Guardian Demo">
    </div>

    <div class="controls">
        <button id="startBtn" onclick="startPresentation()">🚀 START FULL PRESENTATION</button>
        
        <div id="status-box">
            <div class="status-item"><div id="dot-intro" class="status-dot"></div> Intro Section</div>
            <div class="status-item"><div id="dot-strat" class="status-dot"></div> Strategies Analysis</div>
            <div class="status-item"><div id="dot-exec" class="status-dot"></div> Execution & Conclusion</div>
        </div>
        <div id="debug-info" style="font-size: 12px; color: #888; margin-top: 10px;">Browser interaction required to play audio</div>
    </div>

    <script>
        const audioFiles = [
            { id: 'dot-intro', src: 'intro_audio.mp3', delay: 0 },
            { id: 'dot-strat', src: 'strategies_audio.mp3', delay: 45000 },
            { id: 'dot-exec', src: 'execution_audio.mp3', delay: 165000 }
        ];

        function startPresentation() {
            const btn = document.getElementById('startBtn');
            btn.disabled = true;
            btn.innerText = "🎬 PRESENTATION LIVE";
            btn.style.opacity = "0.7";

            audioFiles.forEach(file => {
                const audio = new Audio(file.src);
                audio.volume = 1.0;
                
                // Pre-check loading
                audio.addEventListener('canplaythrough', () => {
                    console.log('Audio track loaded: ' + file.src);
                }, { once: true });

                // Error handling
                audio.addEventListener('error', (e) => {
                    console.error('Error loading audio: ' + file.src);
                    document.getElementById(file.id).classList.add('error');
                    document.getElementById('debug-info').innerText = "Technical Error: Failed to load " + file.src;
                });

                // Scheduled playback
                setTimeout(() => {
                    audio.play().then(() => {
                        document.getElementById(file.id).classList.add('active');
                        document.getElementById('debug-info').innerText = "Now Speaking: " + file.src;
                    }).catch(err => {
                        console.error('Playback failed:', err);
                        document.getElementById('debug-info').innerText = "Playback Blocked by Browser. Try clicking again.";
                    });
                }, file.delay);
            });
        }
    </script>
</body>
</html>
