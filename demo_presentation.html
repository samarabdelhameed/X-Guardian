<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X-Guardian Demo Presentation</title>
    <style>
        body {
            background: #0a0a0b;
            color: #fff;
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            position: relative;
            width: 80%;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 163, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        img {
            width: 100%;
            display: block;
        }
        .controls {
            margin-top: 20px;
            display: flex;
            gap: 20px;
        }
        button {
            background: #00a3ff;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover {
            background: #0082cc;
            transform: scale(1.05);
        }
        #status {
            margin-top: 10px;
            color: #00ffa3;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container" id="videoContainer">
        <img id="demoVideo" src="perfect_demo_take.webp" alt="X-Guardian Demo">
    </div>

    <div class="controls">
        <button onclick="startDemo()">▶ START PRESENTATION</button>
        <button onclick="location.reload()">↺ RESET</button>
    </div>
    
    <div id="status">Click Start to sync AI Voice with the Walkthrough</div>

    <script>
        const audioClips = [
            { id: 'intro', src: 'intro_audio.mp3', delay: 0 },
            { id: 'strategies', src: 'strategies_audio.mp3', delay: 45000 },
            { id: 'execution', src: 'execution_audio.mp3', delay: 165000 }
        ];

        let playbacks = [];

        function startDemo() {
            document.getElementById('status').innerText = "Presentation is LIVE. Synchronizing voice...";
            
            audioClips.forEach(clip => {
                const audio = new Audio(clip.src);
                setTimeout(() => {
                    audio.play();
                }, clip.delay);
                playbacks.push(audio);
            });
        }
    </script>
</body>
</html>
